name: mahjong_tracker_flutter
description: "麻雀成績トラッカー"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ローカルDB
  sqflite: ^2.3.2
  path: ^1.9.0

  # 状態管理
  riverpod: ^2.5.1
  flutter_riverpod: ^2.5.1

  # グラフ
  fl_chart: ^0.68.0

  # JSON
  json_annotation: ^4.9.0

  # ファイル操作（CSV/JSONエクスポート）
  share_plus: ^9.0.0
  file_picker: ^8.0.0
  path_provider: ^2.1.3

  # ホームウィジェット（iOS/Android）
  home_widget: ^0.4.1

  # ユーティリティ
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  flutter_slidable: ^4.0.3
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
